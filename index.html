<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N GALLERY - Rəsmi Mağaza</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --surface-hover: #fafafa;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent-color: #000000;
            --border-color: #d2d2d7;
            --header-bg: rgba(245, 245, 247, 0.8);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --surface-color: #161616;
            --surface-hover: #1c1c1c;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #ffffff;
            --border-color: #262626;
            --header-bg: rgba(10, 10, 10, 0.8);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        /* --- LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: transform 0.8s cubic-bezier(1, 0, 0, 1);
        }
        .loader-logo {
            font-size: 2rem; font-weight: 900; letter-spacing: 8px; color: #000;
            text-align: center;
        }
        .progress-container { width: 150px; height: 2px; background: rgba(0,0,0,0.1); margin-top: 20px; position: relative; }
        .progress-bar { position: absolute; height: 100%; background: #000; width: 0%; transition: width 0.3s; }
        #loader.hidden { transform: translateY(-100%); pointer-events: none; }

        /* --- HEADER --- */
        header {
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0;
            background: var(--header-bg); backdrop-filter: blur(20px); z-index: 1000;
        }
        
        .logo-container { font-weight:900; letter-spacing:1px; font-size: 1.3rem; cursor: pointer; }

        .nav-controls { display: flex; align-items: center; gap: 15px; }

        .social-links { display: flex; align-items: center; gap: 12px; }
        .social-links a { color: var(--text-primary); text-decoration: none; display: flex; align-items: center; opacity: 0.7; transition: opacity 0.3s; }
        .social-links a:hover { opacity: 1; }
        .social-links svg { width: 20px; height: 20px; }

        /* --- CATEGORIES --- */
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            overflow-x: auto;
            padding: 10px 5%;
            scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            padding: 10px 20px;
            border-radius: 30px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .cat-btn.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        /* --- MAIN --- */
        main { max-width: 1400px; margin: 0 auto 60px auto; padding: 0 5%; }
        .section-title { font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 30px; letter-spacing: -1px; }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 25px; 
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card {
            background: var(--surface-color); 
            border-radius: 16px; 
            padding: 15px;
            transition: var(--transition); 
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .product-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1.1;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #eee;
            cursor: zoom-in;
        }
        .product-image { 
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .product-content { flex-grow: 1; display: flex; flex-direction: column; }

        .btn-add {
            width: 100%; padding: 12px; 
            background: var(--text-primary); color: var(--bg-color);
            border: none; border-radius: 10px; font-weight: 700; 
            cursor: pointer; margin-top: auto; transition: opacity 0.2s;
        }
        .btn-add:active { opacity: 0.7; }

        /* --- CART SIDEBAR --- */
        #cart-sidebar {
            position: fixed; right: -100%; top: 0; width: 380px; height: 100%;
            background: var(--surface-color); z-index: 2000; transition: var(--transition);
            padding: 25px; display: flex; flex-direction: column;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
        }
        #cart-sidebar.open { right: 0; }

        .floating-cart {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: var(--text-primary); color: var(--bg-color); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .badge { 
            position: absolute; top: -5px; right: -5px; background: #ff3b30; color: #fff; 
            min-width: 22px; height: 22px; display: none; align-items: center;
            justify-content: center; border-radius: 11px; font-size: 11px; font-weight: 900;
            border: 2px solid var(--bg-color);
        }
        .badge.pop { display: flex; }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; display: none;
            justify-content: center; align-items: center; cursor: zoom-out;
            backdrop-filter: blur(5px);
        }
        #lightbox img { max-width: 90%; max-height: 85%; border-radius: 10px; }
        #lightbox.active { display: flex; }

        @media (max-width: 500px) {
            #cart-sidebar { width: 100%; }
            .product-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body data-theme="light">

    <div id="loader">
        <div class="loader-logo">N GALLERY</div>
        <div class="progress-container"><div class="progress-bar" id="load-bar"></div></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Zoom">
    </div>

    <header>
        <div class="logo-container" onclick="location.reload()">N GALLERY</div>
        <div class="nav-controls">
            <div class="social-links">
                <a href="tel:0777555450"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></a>
                <a href="https://www.instagram.com/n_gallery_/" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
            </div>
            <button id="theme-toggle" style="background:none; border:none; color:inherit; cursor:pointer;">
                <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <div class="category-nav" id="category-list">
        <button class="cat-btn active" onclick="filterCategory('all')">Hamısı</button>
        <button class="cat-btn" onclick="filterCategory('canta')">Çantalar</button>
        <button class="cat-btn" onclick="filterCategory('camadan')">Çamadanlar</button>
        <button class="cat-btn" onclick="filterCategory('idman')">İdman çantaları</button>
        <button class="cat-btn" onclick="filterCategory('hediyye')">Hədiyyə qutuları</button>
    </div>

    <main>
        <h2 id="current-category-title" class="section-title">BÜTÜN MƏHSULLAR</h2>
        <div class="product-grid" id="product-list"></div>
    </main>

    <div class="floating-cart" onclick="toggleCart()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
        <span class="badge" id="cart-count">0</span>
    </div>

    <div id="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h3 style="letter-spacing: 1px;">SƏBƏT</h3>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-primary)">&times;</button>
        </div>
        <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
        <div style="border-top:1px solid var(--border-color); padding-top:20px; margin-top:10px;">
            <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom:20px; font-size:1.1rem;">
                <span>CƏMİ</span>
                <span id="cart-total-price">0.00 AZN</span>
            </div>
            <button onclick="checkout()" style="width:100%; padding:16px; background:#25d366; color:white; border:none; border-radius:12px; font-weight:800; cursor:pointer;">WHATSAPP İLƏ SİFARİŞ ET</button>
        </div>
    </div>

    <script>
        const products = [
            // Çantalar
            { id: 1, category: 'canta', name: "Dəri Əl Çantası", price: 45, color: "Qara", image: "https://images.unsplash.com/photo-1584917033904-493bb3ce3ea1?q=80&w=800&auto=format&fit=crop" },
            { id: 2, category: 'canta', name: "Gündəlik Bel Çantası", price: 35, color: "Qəhvəyi", image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800&auto=format&fit=crop" },
            
            // Çamadanlar
            { id: 3, category: 'camadan', name: "Səyahət Çamadanı (Böyük)", price: 120, color: "Gümüşü", image: "https://images.unsplash.com/photo-1565026057447-bc90a3dceb87?q=80&w=800&auto=format&fit=crop" },
            { id: 4, category: 'camadan', name: "Kabin Ölçülü Çamadan", price: 85, color: "Göy", image: "https://images.unsplash.com/photo-1581553680321-4fffae59fccd?q=80&w=800&auto=format&fit=crop" },
            
            // İdman Çantaları
            { id: 5, category: 'idman', name: "Professional İdman Çantası", price: 55, color: "Mat Qara", image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?q=80&w=800&auto=format&fit=crop" },
            { id: 6, category: 'idman', name: "Yüngül Məşq Çantası", price: 25, color: "Boz", image: "https://images.unsplash.com/photo-1544816155-12df9643f363?q=80&w=800&auto=format&fit=crop" },

            // Hədiyyə Qutuları
            { id: 7, category: 'hediyye', name: "Premium Hədiyyə Dəsti", price: 65, color: "Qızılı", image: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?q=80&w=800&auto=format&fit=crop" },
            { id: 8, category: 'hediyye', name: "Minimalist Qutu", price: 15, color: "Ağ", image: "https://images.unsplash.com/photo-1513201099705-a9746e1e201f?q=80&w=800&auto=format&fit=crop" }
        ];

        let cart = [];
        let currentFilter = 'all';

        // Theme Toggle
        document.getElementById('theme-toggle').onclick = () => {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').innerHTML = isDark 
                ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
                : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
        };

        function filterCategory(cat) {
            currentFilter = cat;
            
            // Update buttons UI
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase().includes(cat) || (cat === 'all' && btn.textContent === 'Hamısı')) {
                    btn.classList.add('active');
                }
            });

            // Update Title
            const titles = {
                all: "BÜTÜN MƏHSULLAR",
                canta: "ÇANTALAR",
                camadan: "ÇAMADANLAR",
                idman: "İDMAN ÇANTALARI",
                hediyye: "HƏDİYYƏ QUTULARI"
            };
            document.getElementById('current-category-title').innerText = titles[cat];

            renderProducts();
        }

        function renderProducts() {
            const list = document.getElementById('product-list');
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            
            list.innerHTML = filtered.map(p => `
                <div class="product-card reveal">
                    <div class="product-image-wrapper" onclick="openLightbox('${p.image}')">
                        <img src="${p.image}" class="product-image" loading="lazy">
                    </div>
                    <div class="product-content">
                        <div style="font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px; font-weight:700;">${p.color}</div>
                        <div style="font-weight:700; font-size:1.1rem; margin: 5px 0;">${p.name}</div>
                        <div style="font-weight:900; font-size:1.2rem; margin-bottom:15px;">${p.price.toFixed(2)} AZN</div>
                        <button class="btn-add" onclick="addToCart(${p.id})">SƏBƏTƏ AT</button>
                    </div>
                </div>
            `).join('');

            // Trigger animation
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            }, 100);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            
            if(inCart) inCart.qty++;
            else cart.push({...product, qty: 1});
            
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const badge = document.getElementById('cart-count');
            let total = 0, count = 0;

            if (cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; opacity:0.5; margin-top:50px;">Səbətiniz boşdur</div>`;
                badge.style.display = 'none';
            } else {
                badge.style.display = 'flex';
                container.innerHTML = cart.map(item => {
                    total += item.price * item.qty;
                    count += item.qty;
                    return `
                        <div style="display:flex; gap:12px; margin-bottom:15px; align-items:center; background:var(--bg-color); padding:10px; border-radius:10px;">
                            <img src="${item.image}" style="width:50px; height:50px; border-radius:6px; object-fit:cover;">
                            <div style="flex:1;">
                                <div style="font-weight:700; font-size:13px;">${item.name}</div>
                                <div style="font-size:12px; opacity:0.7;">${item.price.toFixed(2)} AZN</div>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <button onclick="updateQty(${item.id}, -1)" style="width:22px; height:22px; border-radius:50%; border:1px solid var(--border-color); background:none; color:var(--text-primary); cursor:pointer;">-</button>
                                <span style="font-size:13px; font-weight:700;">${item.qty}</span>
                                <button onclick="updateQty(${item.id}, 1)" style="width:22px; height:22px; border-radius:50%; border:1px solid var(--border-color); background:none; color:var(--text-primary); cursor:pointer;">+</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            document.getElementById('cart-total-price').innerText = total.toFixed(2) + " AZN";
            badge.innerText = count;
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCartUI();
            }
        }

        function toggleCart(forceOpen = false) {
            const side = document.getElementById('cart-sidebar');
            if(forceOpen) side.classList.add('open');
            else side.classList.toggle('open');
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            lb.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function checkout() {
            if(cart.length === 0) return;
            let msg = `*YENİ SİFARİŞ (N GALLERY)*\n━━━━━━━━━━━━━━\n\n`;
            cart.forEach((i, idx) => {
                msg += `${idx + 1}. *${i.name}* (${i.color})\n`;
                msg += `   ${i.qty} ədəd x ${i.price} AZN\n`;
            });
            msg += `\n*CƏMİ:* ${document.getElementById('cart-total-price').innerText}\n\nÜnvan: 28 May metronu yaxınlığı, Peron Gallery.`;
            window.open(`https://wa.me/994773313327?text=${encodeURIComponent(msg)}`);
        }

        // Loader
        window.addEventListener('load', () => {
            const bar = document.getElementById('load-bar');
            let p = 0;
            const int = setInterval(() => {
                p += 5;
                bar.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(int);
                    setTimeout(() => {
                        document.getElementById('loader').classList.add('hidden');
                        renderProducts();
                    }, 200);
                }
            }, 20);
        });
    </script>
</body>
</html>
