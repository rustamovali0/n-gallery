<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N GALLERY - Rəsmi Mağaza</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --surface-hover: #fafafa;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent-color: #000000;
            --border-color: #d2d2d7;
            --header-bg: rgba(245, 245, 247, 0.8);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --surface-color: #161616;
            --surface-hover: #1c1c1c;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #ffffff;
            --border-color: #262626;
            --header-bg: rgba(10, 10, 10, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* --- LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: transform 0.6s cubic-bezier(1, 0, 0, 1);
        }
        .loader-logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 4px; color: var(--text-primary); }
        .progress-container { width: 120px; height: 2px; background: rgba(0,0,0,0.1); margin-top: 20px; position: relative; }
        .progress-bar { position: absolute; height: 100%; background: var(--text-primary); width: 0%; transition: width 0.2s; }
        #loader.hidden { transform: translateY(-100%); }

        /* --- HEADER --- */
        header {
            padding: 12px 4%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0;
            background: var(--header-bg); backdrop-filter: blur(20px); z-index: 1000;
        }
        
        .logo-container { font-weight: 900; letter-spacing: 0.5px; font-size: 1.1rem; cursor: pointer; }

        .nav-controls { display: flex; align-items: center; gap: 12px; }
        .social-links { display: flex; align-items: center; gap: 10px; }
        .social-links a { color: var(--text-primary); opacity: 0.8; transition: opacity 0.2s; }
        .social-links a:hover { opacity: 1; }
        .social-links svg { width: 18px; height: 18px; }

        /* --- CATEGORIES (Centered & Mobile Responsive) --- */
        .category-nav-wrapper {
            width: 100%;
            overflow: hidden;
            margin: 15px 0;
        }

        .category-nav {
            display: flex;
            justify-content: center; /* Center for desktop */
            gap: 8px;
            padding: 5px 4%;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Mobile adjustment for centering or scrolling */
        @media (max-width: 768px) {
            .category-nav {
                justify-content: flex-start; /* Ensure scrolling starts from left on mobile */
            }
        }

        .category-nav::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            padding: 8px 14px;
            border-radius: 20px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.75rem;
            transition: var(--transition);
            flex-shrink: 0;
            cursor: pointer;
        }
        
        .cat-btn.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        /* --- MAIN --- */
        main { max-width: 1400px; margin: 0 auto 80px auto; padding: 0 3%; }
        .section-title { font-size: 1.2rem; font-weight: 800; text-align: left; margin: 10px 0 20px 2%; letter-spacing: -0.5px; }

        @media (min-width: 768px) {
            .section-title { text-align: center; font-size: 2rem; }
        }

        /* --- PRODUCT GRID --- */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }

        .reveal {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card {
            background: var(--surface-color); 
            border-radius: 12px; 
            padding: 8px;
            transition: var(--transition); 
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f0f0f0;
            cursor: pointer;
        }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .product-content { flex-grow: 1; display: flex; flex-direction: column; padding: 2px; }
        .product-color { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; }
        .product-name { font-weight: 700; font-size: 0.85rem; margin: 4px 0; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-weight: 800; font-size: 0.95rem; margin-bottom: 10px; color: var(--text-primary); }

        .btn-add {
            width: 100%; padding: 10px; 
            background: var(--text-primary); color: var(--bg-color);
            border: none; border-radius: 8px; font-weight: 700; font-size: 0.75rem;
            cursor: pointer; margin-top: auto;
            transition: opacity 0.2s;
        }
        .btn-add:active { opacity: 0.7; }

        /* --- CART SIDEBAR --- */
        #cart-sidebar {
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%;
            background: var(--surface-color); z-index: 2000; transition: var(--transition);
            padding: 20px; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        #cart-sidebar.open { right: 0; }

        .floating-cart {
            position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px;
            background: var(--text-primary); color: var(--bg-color); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .badge { 
            position: absolute; top: 0; right: 0; background: #ff3b30; color: #fff; 
            min-width: 20px; height: 20px; display: none; align-items: center;
            justify-content: center; border-radius: 10px; font-size: 10px; font-weight: 900;
            border: 2px solid var(--bg-color);
        }
        .badge.pop { display: flex; }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000; display: none;
            justify-content: center; align-items: center; cursor: pointer;
        }
        #lightbox img { max-width: 95%; max-height: 80%; border-radius: 8px; }
        #lightbox.active { display: flex; }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .cat-btn { font-size: 0.9rem; padding: 10px 20px; }
        }

        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body data-theme="light">

    <div id="loader">
        <div class="loader-logo">N GALLERY</div>
        <div class="progress-container"><div class="progress-bar" id="load-bar"></div></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Zoom">
    </div>

    <header>
        <div class="logo-container" onclick="location.reload()">N GALLERY</div>
        <div class="nav-controls">
            <div class="social-links">
                <a href="tel:0777555450" title="Zəng et"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></a>
                <a href="https://www.instagram.com/n_gallery_/" target="_blank" title="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
                <a href="https://www.tiktok.com/@n_gallery_" target="_blank" title="TikTok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path><circle cx="9" cy="16" r="4"></circle></svg></a>
            </div>
            <button id="theme-toggle" style="background:none; border:none; color:inherit; cursor:pointer;" title="Mövzunu dəyiş">
                <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <div class="category-nav-wrapper">
        <div class="category-nav" id="category-list">
            <button class="cat-btn active" onclick="filterCategory('all')">Hamısı</button>
            <button class="cat-btn" onclick="filterCategory('canta')">Çantalar</button>
            <button class="cat-btn" onclick="filterCategory('camadan')">Çamadanlar</button>
            <button class="cat-btn" onclick="filterCategory('idman')">İdman</button>
            <button class="cat-btn" onclick="filterCategory('hediyye')">Hədiyyə</button>
        </div>
    </div>

    <main>
        <h2 id="current-category-title" class="section-title">BÜTÜN MƏHSULLAR</h2>
        <div class="product-grid" id="product-list"></div>
    </main>

    <div class="floating-cart" onclick="toggleCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
        <span class="badge" id="cart-count">0</span>
    </div>

    <div id="cart-sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="font-weight: 800; font-size: 1rem; letter-spacing: 1px;">SƏBƏT</h3>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:28px; cursor:pointer; color:var(--text-primary)">&times;</button>
        </div>
        <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
        <div style="border-top:1px solid var(--border-color); padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom:15px;">
                <span>CƏMİ</span>
                <span id="cart-total-price">0.00 AZN</span>
            </div>
            <button onclick="checkout()" style="width:100%; padding:14px; background:#25d366; color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer; font-size: 0.9rem;">WHATSAPP İLƏ SİFARİŞ</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, category: 'canta', name: "Dəri Əl Çantası", price: 45, color: "Qara", image: "https://images.unsplash.com/photo-1584917033904-493bb3ce3ea1?q=80&w=800&auto=format&fit=crop" },
            { id: 2, category: 'canta', name: "Gündəlik Bel Çantası", price: 35, color: "Qəhvəyi", image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800&auto=format&fit=crop" },
            { id: 3, category: 'camadan', name: "Səyahət Çamadanı", price: 120, color: "Gümüşü", image: "https://images.unsplash.com/photo-1565026057447-bc90a3dceb87?q=80&w=800&auto=format&fit=crop" },
            { id: 4, category: 'camadan', name: "Kabin Çamadanı", price: 85, color: "Göy", image: "https://images.unsplash.com/photo-1581553680321-4fffae59fccd?q=80&w=800&auto=format&fit=crop" },
            { id: 5, category: 'idman', name: "Professional İdman", price: 55, color: "Mat Qara", image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?q=80&w=800&auto=format&fit=crop" },
            { id: 6, category: 'idman', name: "Yüngül Məşq Çantası", price: 25, color: "Boz", image: "https://images.unsplash.com/photo-1544816155-12df9643f363?q=80&w=800&auto=format&fit=crop" },
            { id: 7, category: 'hediyye', name: "Premium Hədiyyə", price: 65, color: "Qızılı", image: "https://images.unsplash.com/photo-1549465220-1a8b9238cd48?q=80&w=800&auto=format&fit=crop" },
            { id: 8, category: 'hediyye', name: "Minimalist Qutu", price: 15, color: "Ağ", image: "https://images.unsplash.com/photo-1513201099705-a9746e1e201f?q=80&w=800&auto=format&fit=crop" }
        ];

        let cart = [];
        let currentFilter = 'all';

        // Theme Logic
        document.getElementById('theme-toggle').onclick = () => {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').innerHTML = isDark 
                ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
                : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
        };

        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('onclick').includes(cat)) btn.classList.add('active');
            });

            const titles = { all: "BÜTÜN MƏHSULLAR", canta: "ÇANTALAR", camadan: "ÇAMADANLAR", idman: "İDMAN ÇANTALARI", hediyye: "HƏDİYYƏ QUTULARI" };
            document.getElementById('current-category-title').innerText = titles[cat];
            renderProducts();
        }

        function renderProducts() {
            const list = document.getElementById('product-list');
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            
            list.innerHTML = filtered.map(p => `
                <div class="product-card reveal">
                    <div class="product-image-wrapper" onclick="openLightbox('${p.image}')">
                        <img src="${p.image}" class="product-image" loading="lazy">
                    </div>
                    <div class="product-content">
                        <div class="product-color">${p.color}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toFixed(2)} AZN</div>
                        <button class="btn-add" onclick="addToCart(${p.id})">SƏBƏTƏ AT</button>
                    </div>
                </div>
            `).join('');

            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            }, 50);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const inCart = cart.find(item => item.id === id);
            if(inCart) inCart.qty++;
            else cart.push({...product, qty: 1});
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const badge = document.getElementById('cart-count');
            let total = 0, count = 0;

            if (cart.length === 0) {
                container.innerHTML = `<div style="text-align:center; opacity:0.5; margin-top:40px; font-size:0.9rem;">Səbətiniz boşdur</div>`;
                badge.style.display = 'none';
            } else {
                badge.style.display = 'flex';
                container.innerHTML = cart.map(item => {
                    total += item.price * item.qty;
                    count += item.qty;
                    return `
                        <div style="display:flex; gap:12px; margin-bottom:12px; align-items:center;">
                            <img src="${item.image}" style="width:45px; height:45px; border-radius:6px; object-fit:cover;">
                            <div style="flex:1;">
                                <div style="font-weight:700; font-size:12px;">${item.name}</div>
                                <div style="font-size:11px; opacity:0.7;">${item.price.toFixed(2)} AZN</div>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <button onclick="updateQty(${item.id}, -1)" style="width:20px; height:20px; border-radius:50%; border:1px solid var(--border-color); background:none; color:var(--text-primary); cursor:pointer;">-</button>
                                <span style="font-size:12px; font-weight:700;">${item.qty}</span>
                                <button onclick="updateQty(${item.id}, 1)" style="width:20px; height:20px; border-radius:50%; border:1px solid var(--border-color); background:none; color:var(--text-primary); cursor:pointer;">+</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            document.getElementById('cart-total-price').innerText = total.toFixed(2) + " AZN";
            badge.innerText = count;
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCartUI();
            }
        }

        function toggleCart(forceOpen = false) {
            const side = document.getElementById('cart-sidebar');
            if(forceOpen) side.classList.add('open');
            else side.classList.toggle('open');
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            lb.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function checkout() {
            if(cart.length === 0) return;
            let msg = `*YENİ SİFARİŞ (N GALLERY)*\n━━━━━━━━━━━━━━\n\n`;
            cart.forEach((i, idx) => { msg += `${idx + 1}. *${i.name}* (${i.color})\n   ${i.qty} ədəd x ${i.price} AZN\n`; });
            msg += `\n*CƏMİ:* ${document.getElementById('cart-total-price').innerText}`;
            window.open(`https://wa.me/994773313327?text=${encodeURIComponent(msg)}`);
        }

        window.addEventListener('load', () => {
            const bar = document.getElementById('load-bar');
            let p = 0;
            const int = setInterval(() => {
                p += 10;
                bar.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(int);
                    setTimeout(() => { document.getElementById('loader').classList.add('hidden'); renderProducts(); }, 150);
                }
            }, 30);
        });
    </script>
</body>
</html>
